# .github/workflows/ci.yml
# Letakkan file ini di folder .github/workflows/ di repo Anda.
# GitHub akan otomatis menjalankan semua test setiap kali ada push.

name: CI Unit Tests ASD

on:
  push:
    branches: [main, dev, feat/**]

  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          # Tambahkan library lain di requirements.txt
          pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

      - name: Check kode berjalan
        run: echo "OK semua test lulus" && python src/main.py --test